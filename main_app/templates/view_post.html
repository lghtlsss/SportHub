{% extends "base.html" %}

{% block content %}
<div class="post">
    <div class="post-content">
        <div class="post-header">
            <span class="post-info">• Posted by {{ post.author }} N hours ago</span>
        </div>
        <h2 class="post-title">{{ post.title }}</h2>
        <div class="post-body">
            {{ post.text }}
        </div>
        <div class="post-footer">
            <button onclick="toggleLike({{post.id}}, {{current_user.id}}, this)">♡ 0</button>
            <button onclick="viewComment()">💬 Комментарии</button>
        </div>
    </div>
</div>
{% endblock %}
