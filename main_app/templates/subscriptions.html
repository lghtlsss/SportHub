{% extends "base.html" %}

{% block content %}
<style>
    .my-table {
        table-layout: fixed;
    }

    .col-1 {
        width: 84%;
    }

    .col-2 {
        width: 16%;
    }
</style>
<h1 style="text-align: center">Ваши подписки</h1>
<table class="table my-table" style="width: 70%; margin: auto;">
    {% for us_id, name, surname in subs %}
    <tr>
        <td class="col-1">
            <div style="text-align: center; word-wrap: break-word; display: flex; gap: 1%">
                <p style="font-size: 180%">{{name}}</p>
                <p style="font-size: 180%">{{surname}}</p>
            </div>
        </td>
        <td class="col-2">
            <button onclick="toggleSubscribe({{ current_user.id }}, {{ us_id }},  this)"
                    class="btn btn-primary">Отписаться
            </button>
        </td>
    </tr>
    {% endfor %}
</table>

<script>
    function toggleSubscribe(user_id, sub_id, btn) {
        console.log('Click', sub_id, user_id)
        fetch(`/api/users/${user_id}`, {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                subscription_user: sub_id
            })
        })
            .then(res => res.json())
            .then(data => {
                console.log(data);
                btn.innerText = data["new_btn_text"];
            });

    }
</script>
{% endblock %}
