{% extends "base.html" %}

{% block content %}
<h1 style="color: rgb(251 137 91 / 0.9)">Ваша лента</h1>
{% for post in posts %}
<div class="post">
    <div class="post-content">
        <div class="post-header">
            <span class="post-info">• Posted by {{ post.author }} N hours ago</span>
        </div>
        <h2 class="post-title">{{ post.title }}</h2>
        <div class="post-body">
            {{ post.text }}
        </div>
        <div class="post-footer">
            <button>♡ Нравится</button>
            <button>💬 Комментарии</button>
        </div>
    </div>
</div>
{% endfor %}
{% endblock %}
