{% extends "base.html" %}

{% block content %}

<h1 class="feed-title">{{ page_title }}</h1>

<div class="feed-container">

    {% for post, delta, likes, image in posts %}

    <div class="post" data-id="{{ post.id }}">

        <div class="post-content">

            <div class="post-header">
                <span class="post-info">
                    {{ post.author }} {{ delta }}
                </span>
            </div>

            <h2 class="post-title">
                {{ post.title }}
            </h2>

            {% if image %}
            <div class="image-wrapper">
                <img
                        src="/api/images/{{ post.id }}"
                        alt="Изображение"
                        loading="lazy"
                        class="post-image"
                        onclick="openImage(this.src)"
                >
            </div>
            {% endif %}

            <div class="post-body" style="white-space: pre-wrap; word-break: break-word;">
                {{ post.text }}
            </div>

            <div class="post-footer">

                <button onclick="toggleLike({{ post.id }}, {{ current_user.id }}, this)">
                    ♡ {{ likes }}
                </button>

                <a class="post-link-btn" href="/view_post/{{ post.id }}">
                    Открыть пост
                </a>

            </div>

        </div>

    </div>

    {% endfor %}

</div>

<!-- FULLSCREEN IMAGE MODAL -->

<div id="imageModal" class="image-modal">

    <img
            id="modalImage"
            class="modal-image"
            src=""
            alt="Полноразмерное изображение"
    >

</div>

<script>

    /* =========================
       FULLSCREEN IMAGE
    ========================== */

    const imageModal = document.getElementById("imageModal");
    const modalImage = document.getElementById("modalImage");

    function openImage(src) {
        console.log('CLICK', src)

        modalImage.src = src;

        imageModal.classList.add("active");

        document.body.style.overflow = "hidden";
    }

    function closeImage() {

        imageModal.classList.remove("active");

        document.body.style.overflow = "";
    }

    imageModal.addEventListener("click", closeImage);

    document.addEventListener("keydown", (e) => {

        if (e.key === "Escape") {
            closeImage();
        }

    });

    /* =========================
       LIKES
    ========================== */

    function toggleLike(post_id, user, btn) {

        fetch(`/api/post/${post_id}`, {

            method: "PATCH",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({
                user: user,
                likes: 1
            })

        })
            .then(res => res.json())
            .then(data => {

                btn.innerText = `♡ ${data.likes}`;

            });

    }
</script>
<style>
    .image-modal {
    position: fixed !important;
    top: 0 !important;
    left: 0 !important;

    width: 100vw !important;
    height: 100vh !important;

    background: rgba(0, 0, 0, 0.95) !important;

    display: flex !important;
    justify-content: center !important;
    align-items: center !important;

    opacity: 0;
    visibility: hidden;

    transition: opacity 0.2s ease;

    z-index: 999999 !important;
}

.image-modal.active {
    opacity: 1 !important;
    visibility: visible !important;
}

.modal-image {
    max-width: 95% !important;
    max-height: 95% !important;

    object-fit: contain !important;

    border-radius: 12px;
}

.post-image {
    cursor: zoom-in;
}
</style>
{% endblock %}
